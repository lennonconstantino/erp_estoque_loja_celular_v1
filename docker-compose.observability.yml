# Stack de observabilidade LOCAL — métricas (Prometheus) + dashboards (Grafana).
#
# Arquivo SEPARADO do docker-compose.yml principal, de propósito: a observabilidade
# é opcional em dev e não deve acoplar ao ciclo de vida da aplicação. Suba sob demanda:
#
#   docker compose -f docker-compose.observability.yml up -d
#   # Prometheus: http://localhost:9090   Grafana: http://localhost:3000 (admin/admin)
#   docker compose -f docker-compose.observability.yml down
#
# O Prometheus raspa o /metrics da API (OpenTelemetry -> exporter Prometheus).
# A API pode rodar no host (`make be-run`) ou em docker (`make up`): em ambos o
# /metrics fica acessível em host.docker.internal:8080.
#
# Tracing distribuído (OTel Collector + Tempo) e logs (Loki) NÃO entram agora.
# A intenção de adotar a stack completa na migração para microsserviços está
# registrada em docs/architecture/observability.md.
services:
  prometheus:
    image: prom/prometheus:v3.1.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      # Permite raspar a API rodando no host (make be-run) ou publicada via docker.
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.4.0
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"

volumes:
  prometheus-data:
  grafana-data:
