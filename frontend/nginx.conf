server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Healthcheck do Railway/infra: resposta leve sem tocar no SPA.
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # O index.html referencia bundles com hash no nome. Ele NUNCA pode ser
    # cacheado pelo navegador: se ficar, o cliente continua carregando o bundle
    # antigo após um novo build/deploy (o "círculo" que não sumia). Assets com
    # hash abaixo mantêm cache longo — só o HTML de entrada revalida sempre.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
