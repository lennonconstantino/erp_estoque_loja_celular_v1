# Configuração mínima do Prometheus para o ERP em desenvolvimento.
# Raspa o /metrics da API (métricas OpenTelemetry no formato Prometheus) e o
# próprio Prometheus. As regras de alerta são carregadas de rule_files; o
# roteamento de notificação (Alertmanager) entra na fase de microsserviços
# (ver docs/architecture/observability.md), então localmente os alertas só
# aparecem como pending/firing na UI (http://localhost:9090/alerts).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/erp-alerts.yml

scrape_configs:
  - job_name: erp-api
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          service: erp-api

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
