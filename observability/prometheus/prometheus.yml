# Configuração mínima do Prometheus para o ERP em desenvolvimento.
# Raspa o /metrics da API (métricas OpenTelemetry no formato Prometheus) e o
# próprio Prometheus. Alertas/Alertmanager entram na fase de microsserviços
# (ver docs/architecture/observability.md).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: erp-api
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          service: erp-api

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
