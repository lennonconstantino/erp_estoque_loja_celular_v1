services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp_secret
      POSTGRES_DB: erp_estoque
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erp_estoque"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:v4.18.1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    command:
      [ "-path", "/migrations",
        "-database", "postgres://erp:erp_secret@db:5432/erp_estoque?sslmode=disable",
        "up" ]

  api:
    build: ./backend
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://erp:erp_secret@db:5432/erp_estoque?sslmode=disable
      APP_PORT: "8080"
      JWT_SECRET: troque-este-segredo-em-producao
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  pgdata:
